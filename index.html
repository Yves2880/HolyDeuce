<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Holy Deuce - Padel Arcade</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="game-wrapper">
  <canvas id="gameCanvas"></canvas>
  <button class="sound-toggle" id="soundToggle">&#x1F50A;</button>

  <!-- START SCREEN -->
  <div id="startScreen" class="overlay">
    <div class="halo"></div>
    <div class="logo-text">HOLY<span class="deuce">DEUCE</span></div>
    <div class="flame-icon">&#x1F525;</div>
    <div class="tagline">Serve &middot; Sweat &middot; Sin</div>
    <input type="text" id="nicknameInput" class="nickname-input" placeholder="Enter nickname" maxlength="12" autocomplete="off">
    <button class="btn btn-play" id="playBtn">PLAY</button>
    <button class="btn leaderboard-btn" id="showLeaderboardBtn">LEADERBOARD</button>
    <div class="instructions">Move your paddle to return the ball<br>Touch/Mouse &middot; Arrow Keys &middot; A/D</div>
  </div>

  <!-- LEADERBOARD SCREEN -->
  <div id="leaderboardScreen" class="overlay hidden">
    <div class="logo-text" style="font-size:28px;">HOLY<span class="deuce" style="font-size:34px;">DEUCE</span></div>
    <div class="tagline" style="font-size:11px; margin-top:4px;">High Scores</div>
    <div class="score-table" id="scoreTable"></div>
    <button class="btn btn-secondary" id="backBtn">BACK</button>
  </div>

  <!-- GAME OVER SCREEN -->
  <div id="gameOverScreen" class="overlay hidden">
    <div class="logo-text" style="font-size:24px;">GAME<span class="deuce" style="font-size:30px;">OVER</span></div>
    <div class="game-over-score" id="finalScore">0</div>
    <div class="game-over-level" id="finalLevel">Level 1</div>
    <div class="new-high hidden" id="newHighLabel">&#x2B50; NEW HIGH SCORE! &#x2B50;</div>
    <button class="btn btn-play" id="replayBtn">PLAY AGAIN</button>
    <button class="btn leaderboard-btn" id="showLeaderboardBtn2">LEADERBOARD</button>
    <button class="btn btn-secondary" id="menuBtn" style="margin-top:8px;">MENU</button>
  </div>

  <div class="level-banner" id="levelBanner"></div>
</div>

<script src="music.js"></script>
<script src="leaderboard.js"></script>
<script src="game.js"></script>
</body>
</html>
